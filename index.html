<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguarde um momento...</title>
    <style>
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #ffffff;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #25d366;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer-text {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            color: #999;
            width: 90%;
            line-height: 1.4;
        }
        a { color: #999; text-decoration: none; }
    </style>

    <script>
        // Configurações do Redirecionamento
        const config = {
            numero: "5561982319771",
            mensagem: "Vim garantir o meu conteúdo vip",
            atraso: 800 // Tempo em milissegundos (0.8 segundos)
        };

        function iniciarRedirecionamento() {
            const urlFinal = `https://api.whatsapp.com/send?phone=${config.numero}&text=${encodeURIComponent(config.mensagem)}`;
            
            setTimeout(() => {
                window.location.replace(urlFinal);
            }, config.atraso);
        }

        window.onload = iniciarRedirecionamento;

</body>
</html>
